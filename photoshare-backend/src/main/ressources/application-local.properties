# ?????????????????????????????????????????????????????????????
# application-local.properties
# Used when running Spring Boot with: -Dspring-boot.run.profiles=local
# Connects to local Docker containers instead of AWS services
# ?????????????????????????????????????????????????????????????

# Database ? connects to local Docker PostgreSQL
DB_HOST=localhost
DB_PORT=5432
DB_NAME=photoshare
DB_USER=photoshare_admin
DB_PASS=localpassword

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway ? runs migrations on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka ? connects to local Docker Kafka
KAFKA_BROKERS=localhost:9092
spring.kafka.bootstrap-servers=${KAFKA_BROKERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=photoshare-local
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# S3 ? connects to LocalStack instead of real AWS S3
S3_BUCKET=photoshare-images-local
cloud.aws.s3.endpoint=http://localhost:4566
cloud.aws.region.static=ap-south-1
cloud.aws.credentials.access-key=test
cloud.aws.credentials.secret-key=test

# CloudFront ? use LocalStack S3 URL locally (no CDN needed for dev)
CLOUDFRONT_URL=http://localhost:4566/photoshare-images-local

# Cognito ? disable JWT validation locally so you can test without OTP
COGNITO_REGION=ap-south-1
COGNITO_USER_POOL_ID=local-user-pool
COGNITO_APP_CLIENT_ID=local-client-id

# Disable Cognito JWT filter in local profile
app.security.jwt-enabled=false

# Server
server.port=8080

# Logging
logging.level.com.photoshare=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.software.amazon.awssdk=WARN